name: Deploy registry to Pages

# Serves public/ (index.json, index.json.sig, pubkey.txt) at
# https://homeCore-io.github.io/registry/ . Runs on any change to public/
# (the publish workflow commits there) and can be run manually.
on:
  push:
    branches: [main]
    paths: ['public/**']
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; let an in-flight deploy finish (don't cancel).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public
      - id: deploy
        uses: actions/deploy-pages@v4
