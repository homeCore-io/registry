name: Publish plugin to registry

# Add/replace one artifact in index.json, sign it, and commit. Pages redeploys
# on the resulting push (see pages.yml). Called two ways:
#   - repository_dispatch(publish-plugin) from a plugin release (P2), or
#   - workflow_dispatch (manual) with the same fields.
on:
  workflow_dispatch:
    inputs:
      id: { description: 'Plugin id (e.g. plugin.wled)', required: true }
      name: { description: 'Display name', required: true }
      version: { description: 'Semver (no leading v)', required: true }
      os: { description: 'linux', default: 'linux' }
      arch: { description: 'x86_64 | aarch64', default: 'x86_64' }
      url: { description: 'Artifact download URL (GH release asset)', required: true }
      sha256: { description: 'Hex sha256 of the artifact', required: true }
      size: { description: 'Artifact size in bytes', default: '0' }
      min_core: { description: 'Minimum core version (optional)', default: '' }
  repository_dispatch:
    types: [publish-plugin]

permissions:
  contents: write
  pages: write
  id-token: write

# No concurrency group, deliberately.
#
# `group: registry-index` looked like serialization and was not. GitHub keeps at
# most **one pending run per group**, so when a burst of releases dispatches here
# — tagging the fleet does exactly that — each new arrival cancels the one
# already waiting. Ten dispatches on 2026-07-21 produced four cancelled runs and
# two push rejections, and six plugins silently never reached the index while
# every release reported success.
#
# Instead the commit step below re-applies its change onto the freshly fetched
# index and retries. `update-index.py` is idempotent for a given
# (id, version, os, arch), so replaying it against a newer index is correct
# rather than merely safe, and concurrent publishes now merge instead of
# racing.

jobs:
  publish:
    runs-on: ubuntu-latest
    # Deploy Pages from this same job — a commit pushed with GITHUB_TOKEN does
    # NOT trigger pages.yml (GitHub's recursion guard), so we deploy inline.
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install --quiet cryptography

      - name: Resolve inputs (dispatch vs manual)
        id: in
        env:
          EV: ${{ github.event_name }}
          P: ${{ toJson(github.event.client_payload) }}
        run: |
          set -euo pipefail
          if [ "$EV" = "repository_dispatch" ]; then
            get() { echo "$P" | python3 -c "import json,sys;print(json.load(sys.stdin).get('$1',''))"; }
            id=$(get id); name=$(get name); version=$(get version)
            os=$(get os); arch=$(get arch); url=$(get url)
            sha256=$(get sha256); size=$(get size); min_core=$(get min_core)
          else
            id='${{ inputs.id }}'; name='${{ inputs.name }}'; version='${{ inputs.version }}'
            os='${{ inputs.os }}'; arch='${{ inputs.arch }}'; url='${{ inputs.url }}'
            sha256='${{ inputs.sha256 }}'; size='${{ inputs.size }}'; min_core='${{ inputs.min_core }}'
          fi
          [ -n "$id" ] && [ -n "$version" ] && [ -n "$url" ] && [ -n "$sha256" ] || {
            echo "::error::id, version, url and sha256 are required"; exit 1; }
          for k in id name version os arch url sha256 size min_core; do
            printf '%s=%s\n' "$k" "$(eval echo \$$k)" >> "$GITHUB_OUTPUT"
          done

      - name: Update, sign and commit the index
        env:
          REGISTRY_SECRET_KEY: ${{ secrets.REGISTRY_SECRET_KEY }}
        run: |
          set -euo pipefail
          git config user.name  "homecore-registry[bot]"
          git config user.email "registry@users.noreply.github.com"

          # Apply this artifact to whatever the index currently is, sign, and
          # push. If someone else pushed in between, discard our attempt, take
          # their index, and apply ours again — never a rebase, because both
          # commits rewrite the whole of index.json and would always conflict.
          for attempt in 1 2 3 4 5; do
            python scripts/update-index.py public/index.json \
              "${{ steps.in.outputs.id }}" "${{ steps.in.outputs.name }}" \
              "${{ steps.in.outputs.version }}" "${{ steps.in.outputs.os }}" \
              "${{ steps.in.outputs.arch }}" "${{ steps.in.outputs.url }}" \
              "${{ steps.in.outputs.sha256 }}" "${{ steps.in.outputs.size }}" \
              "${{ steps.in.outputs.min_core }}"

            # Sign the exact bytes update-index.py just wrote.
            python scripts/sign-index.py public/index.json

            git add public/index.json public/index.json.sig
            if git diff --cached --quiet; then
              echo "index already carries this artifact — nothing to do"
              exit 0
            fi
            git commit -q -m "registry: ${{ steps.in.outputs.id }} ${{ steps.in.outputs.version }} (${{ steps.in.outputs.os }}/${{ steps.in.outputs.arch }})"

            if git push -q; then
              echo "index updated on attempt ${attempt}"
              exit 0
            fi

            echo "::notice::push rejected (attempt ${attempt}); re-applying onto the current index"
            git reset --hard HEAD~1
            git fetch -q origin "${GITHUB_REF_NAME:-main}"
            git reset --hard "origin/${GITHUB_REF_NAME:-main}"
            sleep $(( attempt * 3 ))
          done

          echo "::error::could not update the index after 5 attempts — another publish keeps winning the race. Re-run this workflow."
          exit 1

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public

      - name: Deploy Pages
        id: deploy
        uses: actions/deploy-pages@v4
